project_id = "your-project-ref"

[auth]
site_url = "http://localhost:8080"
additional_redirect_urls = [
  "http://localhost:8080/**",
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage.vector]
enabled = false

# Every handler relies on the hosted gateway validating bearer JWTs before
# application-level user/admin/service authorization in _shared/edge-auth.ts.
