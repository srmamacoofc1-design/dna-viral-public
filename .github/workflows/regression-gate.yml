name: Regression Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run test suite
        run: npm test -- --reporter=dot

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
